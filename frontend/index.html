    <body>
        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="nav-brand">🐟 Freshwater Fish Detector</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Github</a></li>
            </ul>
        </nav>

        <!-- HEADER -->
        <header class="header">
            <h1>Deteksi Ikan Air Tawar</h1>
            <p>Upload gambar dan lihat hasil deteksi.</p>
        </header>

        <!-- MAIN CONTENT -->
        <div class="container card">
            <h2>Upload Gambar</h2>

            <input
                type="file"
                id="fileInput"
                accept="image/*"
                class="upload-btn"
            />

            <div class="images">
                <div class="image-box">
                    <h3>Gambar Asli</h3>
                    <img id="originalImage" src="" alt="" />
                </div>

                <div class="image-box">
                    <h3>Gambar Deteksi</h3>
                    <img id="resultImage" src="" alt="" />
                </div>
            </div>
            <div id="detections" class="card detection-card"></div>
            <div id="llmResults" class="card" style="margin-top: 18px"></div>
            <!--<button
                style="display: none"
                id="describeBtn"
                class="upload-btn"
            ></button>-->
        </div>

        <footer class="footer">Powered by YOLO — Built by vricap.</footer>

        <script src="app.js"></script>
